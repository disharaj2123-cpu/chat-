<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>chat!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-bg: #128C7E; --primary-dark: #075E54; --bg-color: #ECE5DD;
            --text-color: #333; --app-bg: #ffffff; --header-text: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #d1d7db; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 400px; height: 100vh; background: var(--app-bg);
            position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* Splash & Login */
        #splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s ease; }
        .logo-text { font-size: 50px; font-weight: 700; color: #128C7E; margin-bottom: 20px; }
        
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--app-bg); display: none; flex-direction: column; padding: 30px; align-items: center; z-index: 1000; overflow-y: auto;}
        .login-title { font-size: 24px; font-weight: 600; color: var(--primary-bg); margin-bottom: 20px; margin-top: 30px;}
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; background: #fafafa;}
        button { width: 100%; padding: 12px; background: var(--primary-bg); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        
        /* Main Header */
        .header { background: var(--primary-bg); color: var(--header-text); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header-icons { display: flex; align-items: center; gap: 15px; font-size: 20px; cursor: pointer; position: relative;}
        
        /* Dropdown Menu */
        .menu-dropdown { display: none; position: absolute; right: 0; top: 30px; background: white; color: black; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border-radius: 5px; overflow: hidden; z-index: 2000; width: 120px; }
        .menu-dropdown div { padding: 10px 15px; font-size: 14px; cursor: pointer; }
        .menu-dropdown div:hover { background: #f0f0f0; }

        .search-area { padding: 10px; background: #f6f6f6; display: flex; }
        .search-area input { margin: 0; border-radius: 20px 0 0 20px; flex: 1; padding: 8px 15px; background: #fff; border: 1px solid #ddd; border-right: none;}
        .search-area button { width: auto; margin: 0; border-radius: 0 20px 20px 0; padding: 8px 15px; border: 1px solid var(--primary-bg); }

        .tabs { display: flex; background: var(--primary-bg); color: rgba(255,255,255,0.7); font-weight: 600; font-size: 14px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s;}
        .tab.active { color: white; border-bottom: 3px solid white; }

        .content-area { flex: 1; overflow-y: auto; background: var(--app-bg); }
        .view { display: none; } .view.active { display: block; }

        /* Chat List Items */
        .chat-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #f5f5f5; }
        .chat-dp { width: 50px; height: 50px; border-radius: 50%; background: #ccc; margin-right: 15px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: white; background: #128C7E;}
        .chat-info { flex: 1; border-bottom: 1px solid #f2f2f2; padding-bottom: 10px; display: flex; flex-direction: column; justify-content: center; height: 50px; }
        .chat-name-row { display: flex; justify-content: space-between; align-items: center; }
        .chat-name { font-size: 16px; font-weight: 600; color: var(--text-color); }
        .chat-time { font-size: 12px; color: #888; }
        .chat-msg { font-size: 14px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

        /* Private Chat Room */
        #chat-room { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); flex-direction: column; z-index: 1500; }
        .chat-room-header { background: var(--primary-bg); color: white; padding: 10px; display: flex; align-items: center; }
        .back-btn { font-size: 20px; margin-right: 10px; cursor: pointer; display: flex; align-items: center; }
        .online-status { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: -2px; }
        
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; }
        
        /* Realistic Chat Bubbles */
        .msg { max-width: 75%; padding: 8px 10px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; word-wrap: break-word; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; color: #000; }
        .msg.received { background: #fff; align-self: flex-start; border-top-left-radius: 0; color: #000; }
        
        .msg-time { font-size: 11px; color: #777; float: right; margin-top: 5px; margin-left: 10px; display: flex; align-items: center; gap: 3px;}
        .ticks { color: #53bdeb; font-size: 12px; font-weight: bold; } /* Blue ticks */

        .chat-input-area { padding: 8px 10px; background: #f0f0f0; display: flex; align-items: center; gap: 10px; }
        .chat-input-area input { flex: 1; margin: 0; padding: 12px 15px; border-radius: 25px; border: none; background: #fff; font-size: 15px;}
        .send-btn { background: var(--primary-bg); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 18px; cursor: pointer; display: flex; justify-content: center; align-items: center;}

    </style>
</head>
<body>

<div class="app-container">
    <div id="splash-screen">
        <div class="logo-text">chat!</div>
        <div style="font-size: 14px; color: #555;">Created by Rajdeep & Disha</div>
    </div>

    <div id="login-screen">
        <div class="login-title">Welcome to chat!</div>
        <input type="text" id="regName" placeholder="Your Full Name">
        <input type="number" id="regPhone" placeholder="Phone Number (e.g. 9876543210)">
        <input type="password" id="regPin" placeholder="Set 4-digit Security PIN">
        <button onclick="registerUser()">Login / Create Account</button>
    </div>

    <div class="header" id="main-header" style="display:none;">
        <h1 style="margin: 0;">chat!</h1>
        <div class="header-icons">
            <span onclick="document.getElementById('menu-drop').style.display = document.getElementById('menu-drop').style.display === 'block' ? 'none' : 'block'">⋮</span>
            <div class="menu-dropdown" id="menu-drop">
                <div onclick="logoutUser()">Log out</div>
            </div>
        </div>
    </div>

    <div class="tabs" id="main-tabs" style="display:none;">
        <div class="tab active" onclick="switchView('chats-view')">CHATS</div>
        <div class="tab" onclick="switchView('status-view')">STATUS</div>
    </div>

    <div class="content-area" id="main-content" style="display:none;">
        <div id="chats-view" class="view active">
            
            <div class="search-area">
                <input type="number" id="searchPhone" placeholder="Search by number to chat...">
                <button onclick="searchNewUser()">Search</button>
            </div>
            
            <div id="inbox-list">
                <div style="text-align: center; margin-top: 20px; color: #888; font-size: 14px;">No recent chats. Search a number to start.</div>
            </div>
        </div>

        <div id="status-view" class="view">
            <div style="padding: 20px; text-align: center; color: #888; font-size: 14px;">
                Status feature coming soon!
            </div>
        </div>
    </div>

    <div id="chat-room">
        <div class="chat-room-header">
            <div class="back-btn" onclick="closeChat()">⬅️</div>
            <div class="chat-dp" style="width: 35px; height: 35px; font-size: 16px; margin-right: 10px;" id="room-dp">👤</div>
            <div style="flex: 1;">
                <h3 id="chat-person-name" style="font-size: 16px; margin: 0;">Name</h3>
                <div class="online-status">Online</div>
            </div>
        </div>
        
        <div class="chat-messages" id="message-container"></div>
        
        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Type a message">
            <button class="send-btn" onclick="sendPrivateMsg()">➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // APNAR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDWOyc2WrHaqJfDYGTxFGAri4R932aXR00",
      authDomain: "chat-by-rajdeep.firebaseapp.com",
      projectId: "chat-by-rajdeep",
      storageBucket: "chat-by-rajdeep.firebasestorage.app",
      messagingSenderId: "385676048043",
      appId: "1:385676048043:web:a1758e0529bbf836c469ee"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let myName = "";
    let myPhone = "";
    let currentChatPhone = ""; 
    let currentChatName = "";
    let currentChatId = "";
    let activeChatListener = null;
    let inboxListener = null;

    // 1. App Start
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                
                if(localStorage.getItem('myPhone')) {
                    myName = localStorage.getItem('myName');
                    myPhone = localStorage.getItem('myPhone');
                    showMainApp();
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }
            }, 500);
        }, 2000);
    };

    // 2. Login
    window.registerUser = async function() {
        let name = document.getElementById('regName').value.trim();
        let phone = document.getElementById('regPhone').value.trim();
        let pin = document.getElementById('regPin').value.trim();

        if(name === "" || phone === "" || pin === "") { alert("Fill all details!"); return; }
        
        myName = name; myPhone = phone;
        
        await setDoc(doc(db, "users", myPhone), {
            name: myName, phone: myPhone, joinedAt: serverTimestamp()
        });

        localStorage.setItem('myName', myName);
        localStorage.setItem('myPhone', myPhone);

        showMainApp();
    };

    function showMainApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('main-tabs').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        loadInbox(); // Asol feature: Auto load previous chats
    }

    window.logoutUser = function() {
        localStorage.clear();
        location.reload(); // Reload kore login page e niye jabe
    }

    // 3. Load Real-time Inbox (Recent Chats)
    function loadInbox() {
        const inboxQ = query(collection(db, "users", myPhone, "inbox"), orderBy("timestamp", "desc"));
        
        inboxListener = onSnapshot(inboxQ, (snapshot) => {
            const list = document.getElementById('inbox-list');
            if(snapshot.empty) return; // Jodi kono kotha na hoye thake
            
            list.innerHTML = ''; 
            snapshot.forEach((doc) => {
                let data = doc.data();
                
                let timeStr = "";
                if(data.timestamp) {
                    let d = data.timestamp.toDate();
                    timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                let html = `
                    <div class="chat-item" onclick="openPrivateChat('${data.name}', '${data.phone}')">
                        <div class="chat-dp">${data.name.charAt(0)}</div>
                        <div class="chat-info">
                            <div class="chat-name-row">
                                <span class="chat-name">${data.name}</span>
                                <span class="chat-time">${timeStr}</span>
                            </div>
                            <div class="chat-msg">${data.lastMsg}</div>
                        </div>
                    </div>
                `;
                list.innerHTML += html;
            });
        });
    }

    // 4. Search New User
    window.searchNewUser = async function() {
        let searchP = document.getElementById('searchPhone').value.trim();
        if(searchP === "") return;
        if(searchP === myPhone) { alert("You cannot chat with yourself!"); return; }

        const docRef = doc(db, "users", searchP);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            let friendName = docSnap.data().name;
            document.getElementById('searchPhone').value = "";
            openPrivateChat(friendName, searchP);
        } else {
            alert("Number not found! Ensure your friend has registered.");
        }
    };

    function getChatId(phone1, phone2) {
        return phone1 < phone2 ? `${phone1}_${phone2}` : `${phone2}_${phone1}`;
    }

    // 5. Open Private Chat
    window.openPrivateChat = function(friendName, friendPhone) {
        currentChatName = friendName;
        currentChatPhone = friendPhone;
        currentChatId = getChatId(myPhone, friendPhone);

        document.getElementById('chat-person-name').innerText = friendName;
        document.getElementById('room-dp').innerText = friendName.charAt(0);
        document.getElementById('chat-room').style.display = 'flex';
        
        loadMessages();
    };

    // 6. Load Messages
    function loadMessages() {
        const msgContainer = document.getElementById('message-container');
        msgContainer.innerHTML = '';

        const q = query(collection(db, "private_chats", currentChatId, "messages"), orderBy("timestamp", "asc"));
        
        if(activeChatListener) activeChatListener(); 
        
        activeChatListener = onSnapshot(q, (snapshot) => {
            msgContainer.innerHTML = ''; 
            
            snapshot.forEach((doc) => {
                let data = doc.data();
                let msgDiv = document.createElement('div');
                
                let timeStr = "";
                if(data.timestamp) {
                    let d = data.timestamp.toDate();
                    timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                if (data.senderPhone === myPhone) {
                    msgDiv.className = 'msg sent';
                    msgDiv.innerHTML = `${data.text} <span class="msg-time">${timeStr} <span class="ticks">✓✓</span></span>`;
                } else {
                    msgDiv.className = 'msg received';
                    msgDiv.innerHTML = `${data.text} <span class="msg-time">${timeStr}</span>`;
                }
                msgContainer.appendChild(msgDiv);
            });
            msgContainer.scrollTop = msgContainer.scrollHeight; 
        });
    }

    // 7. Send Message & Update Inbox
    window.sendPrivateMsg = async function() {
        let input = document.getElementById('msg-input');
        let text = input.value.trim();
        
        if(text !== "") {
            input.value = ""; 
            
            // 1. Send Message
            await addDoc(collection(db, "private_chats", currentChatId, "messages"), {
                text: text, senderPhone: myPhone, timestamp: serverTimestamp()
            });

            // 2. Update My Inbox (To show recently on top)
            await setDoc(doc(db, "users", myPhone, "inbox", currentChatPhone), {
                name: currentChatName, phone: currentChatPhone, lastMsg: text, timestamp: serverTimestamp()
            });

            // 3. Update Friend's Inbox (So they get notification)
            await setDoc(doc(db, "users", currentChatPhone, "inbox", myPhone), {
                name: myName, phone: myPhone, lastMsg: text, timestamp: serverTimestamp()
            });
        }
    };

    window.closeChat = function() {
        document.getElementById('chat-room').style.display = 'none';
        if(activeChatListener) activeChatListener(); 
    };

    window.switchView = function(viewId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(viewId).classList.add('active');
    }

    document.getElementById("msg-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") { event.preventDefault(); window.sendPrivateMsg(); }
    });

    // Close menu if clicked outside
    document.addEventListener('click', function(event) {
        if (!event.target.closest('.header-icons')) {
            document.getElementById('menu-drop').style.display = 'none';
        }
    });

</script>
</body>
</html>
